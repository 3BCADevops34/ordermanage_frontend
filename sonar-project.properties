sonar.projectKey=3BCADevops34_ordermanage_frontend
sonar.organization=3bcadevops34
sonar.projectName=ordermanage_frontend

# Analyze only frontend application code and test files.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,src/**/*.spec.js,src/**/*.spec.jsx
sonar.exclusions=node_modules/**,build/**,coverage/**,public/**

# Jest/CRA coverage report consumed by SonarCloud.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
